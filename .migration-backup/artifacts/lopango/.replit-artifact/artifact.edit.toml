kind = "web"
previewPath = "/"
title = "DIGIPARC"
version = "1.0.0"
id = "artifacts/lopango"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24203

[services.development]
run = "pnpm --filter @workspace/lopango run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lopango", "run", "build" ]
run = "pnpm --filter @workspace/lopango run start"

[services.env]
PORT = "24203"
